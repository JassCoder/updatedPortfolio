<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cart</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./index.html">VanillaShop</a>
    <a class="cartlink" href="./cart.html">
      Cart <span id="cartCount" class="badge">0</span>
    </a>
  </header>

  <main class="container">
    <h1>Your Cart</h1>

    <div class="cart-layout">
      <section>
        <div id="cartItems" class="cart-items"></div>
        <div id="emptyCart" class="empty hidden">
          Your cart is empty. Shocking restraint. <a class="link" href="./index.html">Go shopping</a>.
        </div>
      </section>

      <aside class="summary">
        <h2>Order Summary</h2>
        <div class="row"><span>Subtotal</span><strong id="subtotal">$0.00</strong></div>
        <div class="row"><span>Tax (10%)</span><strong id="tax">$0.00</strong></div>
        <div class="row total"><span>Total</span><strong id="total">$0.00</strong></div>

        <button id="clearCartBtn" class="btn btn--ghost">Clear cart</button>
        <button id="checkoutBtn" class="btn">Checkout (fake)</button>
      </aside>
    </div>
  </main>

  <script type="module" src="./js/pages/cart.js"></script>
</body>
</html>
